            background: rgba(0,0,0,0.4);

        .c-num { position: absolute; width: 100%; height: 100%; text-align: center; font-weight: bold; font-size: 0.8rem; color: var(--primary); padding: 8px; }

        .day.active { background: var(--primary); color: #000; font-weight: 900; box-shadow: var(--glow); border: none; }
        
        .full-month-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); z-index: 1000;
            padding: 50px; overflow-y: auto;

            background: var(--glass); border: 1px solid var(--glass-border);

    function playNotificationSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);

        document.getElementById('m-h').style.transform = `translateX(-50%) rotate(${m*6}deg)`;
        document.getElementById('h-h').style.transform = `translateX(-50%) rotate(${h*30 + m/2}deg)`;
        document.getElementById('digital-time').innerText = t.toLocaleTimeString();
        checkAutoNotification(h, m);
    }

    // 2. CALENDAR & ARCHIVE LOGIC
    function renderWeekStrip() {
        const strip = document.getElementById('week-strip');
        strip.innerHTML = '';
        const today = new Date();
        
        weekDisplay.forEach((d, index) => {
            const el = document.createElement('div');
            el.className = `day ${d === selectedDay ? 'active' : ''}`;
            el.innerText = d.substring(0,3);
            el.onclick = () => { 
                selectedDay = d; 
                let currentIdx = today.getDay() === 0 ? 7 : today.getDay();
                let diff = (index + 1) - currentIdx;
                let targetDate = new Date();
                targetDate.setDate(today.getDate() + diff);
                
                updateLessonHeader(targetDate);
                renderWeekStrip(); 
                renderLessons(targetDate); 
            };
            strip.appendChild(el);
        });
    }

    function openArchive() {
        document.getElementById('full-month-modal').style.display = 'block';
        const grid = document.getElementById('archive-grid');
        grid.innerHTML = '';
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        
        for(let i=1; i<=daysInMonth; i++) {
            const d = document.createElement('div');
            d.className = `day ${i === now.getDate() ? 'active' : ''}`;
            d.innerText = i;
            d.onclick = () => {
                const clickedDate = new Date(now.getFullYear(), now.getMonth(), i);
                selectedDay = daysTk[clickedDate.getDay()];
                updateLessonHeader(clickedDate); 
                closeArchive();
                renderWeekStrip();
                renderLessons(clickedDate);
            };
            grid.appendChild(d);
        }
    }

    function closeArchive() { document.getElementById('full-month-modal').style.display = 'none'; }

    // 3. LESSONS LOGIC (Takyk sena we wagta görä)
    function renderLessons(targetDate = new Date()) {
        const list = document.getElementById('lesson-list');
        list.innerHTML = '';
        
        const dateKey = `${String(targetDate.getDate()).padStart(2, '0')}.${String(targetDate.getMonth() + 1).padStart(2, '0')}.${targetDate.getFullYear()}`;
        const daily = schedule[dateKey] || [];
        const nowTime = new Date();
        
        daily.forEach(s => {
            const [sH, sM] = s.time.split(':').map(Number);
            const lessonMins = sH * 60 + sM;
            const currentMins = nowTime.getHours() * 60 + nowTime.getMinutes();
            
            let locked = false;
            const isToday = targetDate.toDateString() === nowTime.toDateString();
            const isFuture = targetDate > nowTime && !isToday;

            // Gulp logikasy: Geljek sena ýa-da şu günki gelmedik sagat bolsa gulpla
            if (isFuture) locked = true;
            if (isToday && currentMins < lessonMins) locked = true;

            const card = document.createElement('div');
            card.className = `lesson-card ${locked ? 'locked' : ''}`;
            card.onclick = () => !locked && openLesson(s);
            // ŞU ÝERINI ÜÝTGEDIŇ:
card.innerHTML = `
    <div class="l-num">${s.id}</div>
    <div>
        <h3>${s.name}</h3>
        <p style="opacity:0.7; font-size:0.85rem; margin-top:2px; color:var(--primary);">👨‍🏫 ${s.mugallym || 'Mugallym bellenmedik'}</p>
        <p style="opacity:0.4; font-size:0.75rem; margin-top:4px;">🕒 ${s.time}</p>
    </div>
    ${locked ? '<span class="lock-tag">🔒 GULPLY</span>' : ''}
`;
            list.appendChild(card);
        });

        if(daily.length === 0) {
            list.innerHTML = `<p style="text-align:center; opacity:0.3; margin-top:30px;">Bu sene üçin sapak tapylmady.</p>`;
        }
    }

    // AWTOMATIKI BILDIRIŞ
    function checkAutoNotification(h, m) {
        const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
        const todayDate = new Date();
        const dateKey = `${String(todayDate.getDate()).padStart(2, '0')}.${String(todayDate.getMonth() + 1).padStart(2, '0')}.${todayDate.getFullYear()}`;
        const todaySapaklar = schedule[dateKey] || [];

        todaySapaklar.forEach(s => {
            if(s.time === timeStr && !notifiedIds.includes(dateKey + s.id)) {
                notifiedIds.push(dateKey + s.id);
                renderLessons(todayDate);
                playNotificationSound();
                if(Notification.permission === "granted") {
                    new Notification("Sapak Başlady!", { body: s.name + " mowzugy açyldy." });
                }
            }
        });
    }

    // ŞU SETIRI TAPYP ÜÝTGEDIŇ:
function openLesson(s) {
    currentSapak = s;
    document.getElementById('det-title').innerText = s.name;
    // MUGALLYM ADY ŞU ÝERE GOŞULDY:
    document.getElementById('det-time').innerText = "Wagty: " + s.time + " | Mugallym: " + s.mugallym;
    document.getElementById('det-mowzuk').innerText = s.mowzuk || "Mowzuk girizilmedik";
    // ... galan kodlar şol bir durşuna
        document.getElementById('det-konspekt').innerText = s.konspekt;
        document.getElementById('home-page').classList.remove('active-page');
        document.getElementById('detail-page').classList.add('active-page');
        window.scrollTo(0,0);
    }

    // 4. VOICE CONTROL
    function toggleVoiceMenu() {
        const m = document.getElementById('voice-menu');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }

    function speak(lang) {
        if(!currentSapak) return;
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(`Mowzuk: ${currentSapak.mowzuk}. Konspekt: ${currentSapak.konspekt}`);
        const voices = { tk: 'tr-TR', ru: 'ru-RU', en: 'en-US' };
        msg.lang = voices[lang];
        window.speechSynthesis.speak(msg);
        toggleVoiceMenu();
    }

    function goHome() {
        document.getElementById('detail-page').classList.remove('active-page');
        document.getElementById('home-page').classList.add('active-page');
        window.speechSynthesis.cancel();
    }

    window.onload = () => {
        initClock();
        setInterval(updateClock, 1000);
        updateLessonHeader(new Date()); 
        renderWeekStrip();
        renderLessons();
        // ŞU ÝERINI ÜÝTGEDIŇ:
if(Notification.permission === "granted") {
    // MUGALLYM ADY BILDIRIŞE GOŞULDY:
    new Notification("Sapak Başlady!", { body: s.name + " (" + s.mugallym + ") wagty geldi." });
}
    };

    

    // Sag düwmäni ýapmak
    document.addEventListener('contextmenu', event => event.preventDefault());

    // F12 we Ctrl+U ýaly klawişleri ýapmak
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && (e.keyCode == 85 || e.keyCode == 83))) {
            return false;
        }
    };




    

window.onload = () => {
    initClock();
    setInterval(updateClock, 1000);
    updateLessonHeader(new Date()); 
    renderWeekStrip();
    renderLessons();

    // Bellenen wagtlar
    const bildirisWagtlary = ["08:30", "10:00", "11:40"];
    let sonkyBildiris = "";

    // Her 30 sekuntdan wagty barlaýan funksiýa
    setInterval(() => {
        const indi = new Date();
        const suWagt = indi.getHours().toString().padStart(2, '0') + ":" + 
                       indi.getMinutes().toString().padStart(2, '0');

        // Eger wagt bellenen wagt bolsa we şol minutda bildiriş berilmedik bolsa
        if (bildirisWagtlary.includes(suWagt) && sonkyBildiris !== suWagt) {
            sonkyBildiris = suWagt;

            // 1. Ekranda bildiriş (Browser Notification)
            if (Notification.permission === "granted") {
                new Notification("Sapak Bildirişi", {
                    body: "Sapak Baslady, talyplara mowzuklar hem konspektler berildi",
                    icon: "https://cdn-icons-png.flaticon.com/512/3596/3596144.png"
                });
            }

            // 2. Sesli bildiriş (Speech Synthesis)
            const ses = new SpeechSynthesisUtterance("Sapak Baslady, talyplara mowzuklar hem konspektler berildi");
            ses.lang = 'tr-TR'; // Türkmen diline iň ýakyn ses ritmi
            ses.pitch = 1;
            ses.rate = 0.9;
            window.speechSynthesis.speak(ses);

            // 3. Goşmaça äpişik (Alert)
            console.log("Bildiriş ugradyldy: " + suWagt);
        }
    }, 30000);

    // Bildiriş üçin rugsat soramak
    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }
};
